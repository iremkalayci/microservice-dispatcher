services:
  # ═══════════════════════════════════════════
  #  VERİTABANLARI
  # ═══════════════════════════════════════════
  dispatcher-db:
    image: mongo:latest
    container_name: dispatcher-db
    ports:
      - "27021:27017"
    networks:
      - backend-network

  auth-db:
    image: mongo:latest
    container_name: auth-db
    ports:
      - "27017:27017"
    networks:
      - backend-network

  user-db:
    image: mongo:latest
    container_name: user-db
    ports:
      - "27020:27017"
    networks:
      - backend-network

  product-db:
    image: mongo:latest
    container_name: product-db
    ports:
      - "27018:27017"
    networks:
      - backend-network

  order-db:
    image: mongo:latest
    container_name: order-db
    ports:
      - "27019:27017"
    networks:
      - backend-network

  # ═══════════════════════════════════════════
  #  SERVİSLER
  # ═══════════════════════════════════════════

  dispatcher:
    build: ./dispatcher
    container_name: dispatcher
    env_file: ./dispatcher/.env
    ports:
      - "3000:3000"
    environment:
      - DISPATCHER_DB_URI=mongodb://dispatcher-db:27017/dispatcher_db
      - AUTH_SERVICE_URL=http://auth-service:3003
      - USER_SERVICE_URL=http://user-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - ORDER_SERVICE_URL=http://order-service:3004
      - JWT_SECRET=irem_secret_key
      - LOKI_URL=http://loki:3100
    depends_on:
      - dispatcher-db
      - auth-service
      - user-service
      - product-service
      - order-service
      - loki
    networks:
      - backend-network

  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      - MONGO_URI=mongodb://auth-db:27017/auth_db
      - PORT=3003
      - JWT_SECRET=irem_secret_key
    depends_on:
      - auth-db
    networks:
      - backend-network

  user-service:
    build: ./user-service
    container_name: user-service
    environment:
      - MONGO_URI=mongodb://user-db:27017/user_db
      - PORT=3001
    depends_on:
      - user-db
    networks:
      - backend-network

  product-service:
    build: ./product-service
    container_name: product-service
    environment:
      - MONGO_URI=mongodb://product-db:27017/product_db
      - PORT=3002
    depends_on:
      - product-db
    networks:
      - backend-network

  order-service:
    build: ./order-service
    container_name: order-service
    environment:
      - MONGO_URI=mongodb://order-db:27017/order_db
      - PORT=3004
    depends_on:
      - order-db
    networks:
      - backend-network

  # ═══════════════════════════════════════════
  #  İZLEME & TEST ARAÇLARI
  # ═══════════════════════════════════════════

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - backend-network

  loki:
    image: grafana/loki:latest
    container_name: loki
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - backend-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3030:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - backend-network

  locust:
    image: locustio/locust:latest
    container_name: locust
    ports:
      - "8089:8089"
    volumes:
      - ./locustfile.py:/home/locust/locustfile.py
    command: -f /home/locust/locustfile.py --host=http://dispatcher:3000
    depends_on:
      - dispatcher
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  loki-data: