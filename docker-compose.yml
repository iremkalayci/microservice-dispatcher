services:
  # ═══════════════════════════════════════════
  #  VERİTABANLARI (Her servis izole DB'ye sahip)
  # ═══════════════════════════════════════════
  dispatcher-db:
    image: mongo:latest
    container_name: dispatcher-db
    networks:
      - backend-network

  auth-db:
    image: mongo:latest
    container_name: auth-db
    networks:
      - backend-network

  user-db:
    image: mongo:latest
    container_name: user-db
    networks:
      - backend-network

  product-db:
    image: mongo:latest
    container_name: product-db
    networks:
      - backend-network

  order-db:
    image: mongo:latest
    container_name: order-db
    networks:
      - backend-network

  # ═══════════════════════════════════════════
  #  SERVİSLER
  # ═══════════════════════════════════════════

  # --- API GATEWAY (Tek dışa açık servis) ---
  dispatcher:
    build: ./dispatcher
    container_name: dispatcher
    ports:
      - "3000:3000"
    environment:
      - DISPATCHER_DB_URI=mongodb://dispatcher-db:27017/dispatcher_db
      - AUTH_SERVICE_URL=http://auth-service:3003
      - USER_SERVICE_URL=http://user-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - ORDER_SERVICE_URL=http://order-service:3004
      - JWT_SECRET=irem_secret_key
    depends_on:
      - dispatcher-db
      - auth-service
      - user-service
      - product-service
      - order-service
    networks:
      - backend-network

  # --- MİKROSERVİSLER (Sadece iç ağda, dışa kapalı) ---
  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      - MONGO_URI=mongodb://auth-db:27017/auth_db
      - PORT=3003
      - JWT_SECRET=irem_secret_key
    depends_on:
      - auth-db
    networks:
      - backend-network

  user-service:
    build: ./user-service
    container_name: user-service
    environment:
      - MONGO_URI=mongodb://user-db:27017/user_db
      - PORT=3001
    depends_on:
      - user-db
    networks:
      - backend-network

  product-service:
    build: ./product-service
    container_name: product-service
    environment:
      - MONGO_URI=mongodb://product-db:27017/product_db
      - PORT=3002
    depends_on:
      - product-db
    networks:
      - backend-network

  order-service:
    build: ./order-service
    container_name: order-service
    environment:
      - MONGO_URI=mongodb://order-db:27017/order_db
      - PORT=3004
    depends_on:
      - order-db
    networks:
      - backend-network

# ═══════════════════════════════════════════
#  AĞ YAPILANDIRMASI
#  Sadece dispatcher dışarıya port açar (3000)
#  Mikroservisler sadece iç ağda erişilebilir
# ═══════════════════════════════════════════
networks:
  backend-network:
    driver: bridge