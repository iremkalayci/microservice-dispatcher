services:
  # --- VERİTABANLARI ---
  dispatcher-db:
    image: mongo:latest
    container_name: dispatcher-db
    ports:
      - "27021:27017"
    networks:
      - backend-network

  auth-db:
    image: mongo:latest
    container_name: auth-db
    ports:
      - "27019:27017"
    networks:
      - backend-network

  # --- SERVİSLER ---
  dispatcher:
    build: ./dispatcher
    container_name: dispatcher
    ports:
      - "3000:3000"
    environment:
      - DISPATCHER_DB_URI=mongodb://dispatcher-db:27017/dispatcher_db
      - AUTH_SERVICE_URL=http://auth-service:3003
      - USER_SERVICE_URL=http://user-service:3002
      - PRODUCT_SERVICE_URL=http://product-service:3005
      - ORDER_SERVICE_URL=http://order-service:3004
      - JWT_SECRET=irem_secret_key
    depends_on:
      - dispatcher-db
    networks:
      - backend-network

  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      - MONGO_URI=mongodb://auth-db:27017/auth_db
      - PORT=3003
    depends_on:
      - auth-db
    networks:
      - backend-network

# --- İŞTE EKSİK OLAN VE HATAYA SEBEP OLAN KISIM BURASI ---
networks:
  backend-network:
    driver: bridge